# (선택) Render Blueprint — 기본 배포는 Vercel+Supabase (DEPLOY.md)
# Git 연결 후 "New > Blueprint" 로 Web + Postgres 한 번에 배포
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: timetable
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npx prisma generate && npm run build
    preDeployCommand: npx prisma migrate deploy
    startCommand: bash scripts/start-production.sh
    healthCheckPath: /login
    envVars:
      - key: NODE_VERSION
        value: 22.15.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: timetable-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true

databases:
  - name: timetable-db
    plan: free
    databaseName: timetable
    user: timetable
